name: рџ“– Auto README Updater

on:
  schedule:
    # Every Monday at 9:00 AM IST (03:30 UTC) вЂ” weekly README refresh
    - cron: '30 3 * * 1'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-readme:
    name: рџ“– Update README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "Activity Bot"
          git config user.email "activity-bot@users.noreply.github.com"

      - name: Count activity log files
        id: stats
        run: |
          mkdir -p activity-log
          COUNT=$(ls activity-log/*.md 2>/dev/null | wc -l)
          LATEST=$(ls activity-log/*.md 2>/dev/null | sort | tail -1 | xargs basename 2>/dev/null || echo "N/A")
          FIRST=$(ls activity-log/*.md 2>/dev/null | sort | head -1 | xargs basename 2>/dev/null || echo "N/A")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "first=$FIRST" >> $GITHUB_OUTPUT
          echo "рџ“Љ Total logs: $COUNT | Latest: $LATEST | First: $FIRST"

      - name: Generate updated README
        env:
          LOG_COUNT: ${{ steps.stats.outputs.count }}
          LATEST_LOG: ${{ steps.stats.outputs.latest }}
          FIRST_LOG: ${{ steps.stats.outputs.first }}
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M UTC")
          YEAR=$(date +"%Y")

          # Generate a progress bar for the year
          DAY_OF_YEAR=$(date +"%j")
          TOTAL_DAYS=365
          PROGRESS=$((DAY_OF_YEAR * 20 / TOTAL_DAYS))
          BAR=""
          for i in $(seq 1 20); do
            if [ $i -le $PROGRESS ]; then
              BAR="${BAR}в–€"
            else
              BAR="${BAR}в–‘"
            fi
          done
          PERCENT=$((DAY_OF_YEAR * 100 / TOTAL_DAYS))

          cat > README.md << EOF
          # рџ¤– GitHub Activity Bot

          > Keeping the contribution graph green, automatically. рџЊї

          ---

          ## рџ“Љ Stats

          | Metric | Value |
          |--------|-------|
          | рџ“… Last Updated | ${DATE} at ${TIME} |
          | рџ“ќ Total Activity Logs | ${LOG_COUNT} days logged |
          | рџ—“пёЏ Tracking Since | ${FIRST_LOG} |
          | рџ”Ґ Latest Log | ${LATEST_LOG} |

          ---

          ## рџ—“пёЏ Year Progress вЂ” ${YEAR}

          \`${BAR}\` **${PERCENT}%** of ${YEAR} complete (Day ${DAY_OF_YEAR} / ${TOTAL_DAYS})

          ---

          ## вљ™пёЏ What This Bot Does

          | Activity | Schedule | Description |
          |----------|----------|-------------|
          | рџ“ќ Daily Commits | 3Г— per day | Pushes a dev log entry with a tip & quote |
          | рџ“– README Updates | Every Monday | Refreshes this file with latest stats |
          | рџђ› Issue Rotation | Every Wednesday | Opens and closes tracked issues |
          | в­ђ Star Activity | Every Friday | Stars repos in specified topics |

          ---

          ## рџ—‚пёЏ Activity Log

          \`activity-log/\` contains daily Markdown log files, one per day.
          Each file includes a developer tip, a quote, and a streak status.

          ---

          ## рџљЂ Setup

          See [SETUP.md](./SETUP.md) for how to deploy this to your own repo.

          ---

          _Auto-updated every Monday В· Powered by GitHub Actions_
          EOF

          echo "вњ… README.md generated!"

      - name: Commit README update
        run: |
          git add README.md
          git diff --staged --quiet && echo "No README changes" && exit 0
          git commit -m "рџ“– Auto-update README вЂ” $(date +"%Y-%m-%d")"
          git push
          echo "вњ… README pushed!"
