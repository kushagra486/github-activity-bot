name: 🤖 Daily GitHub Activity Bot

on:
  schedule:
    # Runs every day at 10:00 AM IST (04:30 UTC) — tuned for Lucknow timezone
    - cron: '30 4 * * *'
    # Also runs at 2:00 PM IST (08:30 UTC) for a second daily commit
    - cron: '30 8 * * *'
    # Evening activity at 7:00 PM IST (13:30 UTC)
    - cron: '30 13 * * *'
  workflow_dispatch:
    inputs:
      activity_type:
        description: 'Which activity to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - commit
          - readme
          - issue
          - star

permissions:
  contents: write
  issues: write

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Daily Commit — pushes a small log file
  # ──────────────────────────────────────────────
  daily-commit:
    name: 📝 Daily Commit
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.activity_type == 'all' || github.event.inputs.activity_type == 'commit')
      || github.event_name == 'schedule'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git identity
        run: |
          git config user.name "Activity Bot"
          git config user.email "activity-bot@users.noreply.github.com"

      - name: Write daily activity log entry
        run: |
          mkdir -p activity-log

          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M:%S UTC")
          WEEKDAY=$(date +"%A")
          WEEK=$(date +"%V")
          MONTH=$(date +"%B %Y")

          LOG_FILE="activity-log/${DATE}.md"

          # Pick a random dev tip to keep it interesting
          TIPS=(
            "💡 Tip: Use \`git stash\` to save work-in-progress without committing."
            "💡 Tip: \`git bisect\` can help you find which commit introduced a bug."
            "💡 Tip: Keep functions small — aim for single responsibility."
            "💡 Tip: Write tests before fixing bugs to prevent regressions."
            "💡 Tip: Use semantic versioning: MAJOR.MINOR.PATCH."
            "💡 Tip: Document your 'why', not just your 'what'."
            "💡 Tip: Code reviews improve quality AND spread knowledge."
            "💡 Tip: Automate repetitive tasks — like this one! 🤖"
            "💡 Tip: Use meaningful variable names. \`userData\` > \`ud\`."
            "💡 Tip: Commit early, commit often."
            "💡 Tip: Learn one new terminal shortcut every week."
            "💡 Tip: Profile before optimizing — don't guess the bottleneck."
            "💡 Tip: REST APIs: use nouns for resources, verbs for HTTP methods."
            "💡 Tip: Vector databases are the backbone of modern RAG pipelines."
            "💡 Tip: In LLM prompts, role + task + constraints = better outputs."
          )
          RANDOM_TIP="${TIPS[$RANDOM % ${#TIPS[@]}]}"

          QUOTES=(
            "\"Any fool can write code that a computer can understand. Good programmers write code that humans can understand.\" — Martin Fowler"
            "\"First, solve the problem. Then, write the code.\" — John Johnson"
            "\"Programs must be written for people to read.\" — Harold Abelson"
            "\"Talk is cheap. Show me the code.\" — Linus Torvalds"
            "\"The best error message is the one that never shows up.\" — Thomas Fuchs"
            "\"Code is like humor. When you have to explain it, it's bad.\" — Cory House"
            "\"Make it work, make it right, make it fast.\" — Kent Beck"
            "\"Simplicity is the soul of efficiency.\" — Austin Freeman"
          )
          RANDOM_QUOTE="${QUOTES[$RANDOM % ${#QUOTES[@]}]}"

          cat > "$LOG_FILE" << EOF
          # 📅 Activity Log — ${DATE}

          **Day:** ${WEEKDAY} | **Week:** ${WEEK} | **Month:** ${MONTH}
          **Logged at:** ${TIME}

          ---

          ## 🎯 Today's Dev Focus
          _Tracking daily coding activity to maintain an active GitHub contribution graph._

          ${RANDOM_TIP}

          ---

          ## 💬 Quote of the Day
          ${RANDOM_QUOTE}

          ---

          ## 📊 Streak Status
          - ✅ Commit: Done
          - 🤖 Automation: Running
          - 🔥 Keep the streak alive!

          ---
          _Auto-generated by GitHub Activity Bot · [View Workflow](../../actions)_
          EOF

          echo "✅ Log written to $LOG_FILE"
          cat "$LOG_FILE"

      - name: Commit and push
        run: |
          git add activity-log/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "🤖 Daily activity log — $(date +"%Y-%m-%d %H:%M UTC")"
          git push
          echo "✅ Pushed daily commit!"
