name: ⭐ Auto Star Repos

on:
  schedule:
    # Every Friday at 6:00 PM IST (12:30 UTC) — end-of-week discovery
    - cron: '30 12 * * 5'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Comma-separated topics to search (e.g. llm,fastapi,nextjs)'
        required: false
        default: 'llm,rag,crewai,fastapi,nextjs'

permissions:
  contents: read

jobs:
  star-repos:
    name: ⭐ Star Trending Repos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Star repos via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TOPICS: ${{ github.event.inputs.topics || 'llm,rag,crewai,fastapi,nextjs,supabase,groq,langchain,autonomous-agents,vector-database' }}
        run: |
          python3 << 'PYEOF'
          import os
          import requests
          import random
          import json
          from datetime import datetime, timedelta

          token = os.environ["GH_TOKEN"]
          raw_topics = os.environ.get("INPUT_TOPICS", "llm,fastapi,nextjs")
          topics = [t.strip() for t in raw_topics.split(",") if t.strip()]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          def search_repos(topic, min_stars=50):
              """Search GitHub for repos matching a topic, created recently."""
              since = (datetime.utcnow() - timedelta(days=30)).strftime("%Y-%m-%d")
              query = f"topic:{topic} stars:>{min_stars} created:>{since}"
              url = "https://api.github.com/search/repositories"
              params = {
                  "q": query,
                  "sort": "stars",
                  "order": "desc",
                  "per_page": 10
              }
              resp = requests.get(url, headers=headers, params=params)
              if resp.status_code == 200:
                  return resp.json().get("items", [])
              else:
                  print(f"  ⚠️ Search failed for {topic}: {resp.status_code}")
                  return []

          def is_already_starred(owner, repo):
              url = f"https://api.github.com/user/starred/{owner}/{repo}"
              resp = requests.get(url, headers={
                  **headers,
                  "Accept": "application/vnd.github.v3+json"
              })
              return resp.status_code == 204

          def star_repo(owner, repo):
              url = f"https://api.github.com/user/starred/{owner}/{repo}"
              resp = requests.put(url, headers={
                  **headers,
                  "Content-Length": "0"
              })
              return resp.status_code == 204

          print(f"🔍 Searching repos for topics: {topics}")
          print(f"📅 Looking for repos created in the last 30 days\n")

          starred_count = 0
          skipped_count = 0
          MAX_STARS_PER_RUN = 5  # Stay safe — don't spam

          all_repos = []
          for topic in topics:
              print(f"  📌 Topic: {topic}")
              repos = search_repos(topic)
              all_repos.extend(repos)
              print(f"     Found {len(repos)} candidates")

          # Deduplicate by full_name
          seen = set()
          unique_repos = []
          for r in all_repos:
              if r["full_name"] not in seen:
                  seen.add(r["full_name"])
                  unique_repos.append(r)

          # Shuffle for variety
          random.shuffle(unique_repos)

          print(f"\n⭐ Attempting to star up to {MAX_STARS_PER_RUN} repos...\n")

          for repo in unique_repos:
              if starred_count >= MAX_STARS_PER_RUN:
                  break

              owner = repo["owner"]["login"]
              name = repo["name"]
              stars = repo["stargazers_count"]
              desc = (repo.get("description") or "")[:80]
              url = repo["html_url"]

              if is_already_starred(owner, name):
                  print(f"  ↩️  Already starred: {owner}/{name}")
                  skipped_count += 1
                  continue

              success = star_repo(owner, name)
              if success:
                  print(f"  ✅ Starred: {owner}/{name} ({stars}⭐) — {desc}")
                  starred_count += 1
              else:
                  print(f"  ❌ Failed to star: {owner}/{name}")

          print(f"\n📊 Summary:")
          print(f"   ⭐ Newly starred: {starred_count}")
          print(f"   ↩️  Already starred (skipped): {skipped_count}")
          print(f"   ✅ Done!")
          PYEOF
